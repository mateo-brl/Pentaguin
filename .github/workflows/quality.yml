# CI qualité — aucun secret utilisé : sûre à exécuter sur les PR de forks (repo public).
name: Quality

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --ci

      - name: Validation du contenu pédagogique
        run: npm run validate:content
