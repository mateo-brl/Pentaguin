# Pipeline de release TestFlight
# Build iOS sans Mac : runner macOS GitHub (gratuit sur repo public) + `eas build --local`
# (ne consomme pas le quota EAS cloud). Secrets requis (GitHub → Settings → Secrets) :
#   EXPO_TOKEN              token robot expo.dev — récupère les credentials de signature depuis EAS
#   ASC_KEY_ID              id de la clé API App Store Connect
#   ASC_ISSUER_ID           issuer id App Store Connect
#   ASC_API_KEY_P8_BASE64   contenu du fichier .p8 encodé en base64
#
# Repo PUBLIC : déclenchement uniquement manuel ou par tag — jamais sur pull_request
# (les forks n'ont pas les secrets, et on ne veut pas builder leur code avec).
# Prérequis one-time (jalon M7) : `eas init` + `eas credentials` depuis la machine de dev.
name: iOS build (EAS local)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    # 120 min : buildReactNativeFromSource compile tout React Native depuis les sources.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm install -g eas-cli

      - name: Build IPA (local)
        run: eas build --platform ios --profile production --local --non-interactive --output build/pentaguin.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Conserver le répertoire de build pour pouvoir lire les logs xcodebuild en cas d'échec.
          EAS_LOCAL_BUILD_SKIP_CLEANUP: "1"

      # Diagnostic : la sortie xcodebuild détaillée (dont l'échec du script ExpoModulesJSI)
      # part dans un fichier tee séparé, invisible dans le résumé fastlane. On l'extrait ici.
      - name: Dump Xcode logs on failure
        if: failure()
        run: |
          echo "===== fichiers de log trouvés ====="
          find /private/var/folders /var/folders "$HOME/Library/Logs" -name "*.log" 2>/dev/null \
            | grep -iE "Pentaguin|xcodebuild|eas-build" | head -40
          echo "===== erreurs xcodebuild (Pentaguin-*.log) ====="
          find /private/var/folders /var/folders -name "Pentaguin-*.log" 2>/dev/null | while read -r f; do
            echo "----- $f -----"
            grep -nE "error:|error |fatal|failed|xcframework|ExpoModulesJSI|No such|not found|line [0-9]+:" "$f" | tail -120
          done
          echo "===== sortie brute des scripts de build phase (.sh) ExpoModulesJSI ====="
          find /private/var/folders /var/folders -path "*ExpoModulesJSI.build*" -name "Script-*.sh" 2>/dev/null | while read -r s; do
            echo "----- $s -----"; cat "$s"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: pentaguin-ios
          path: build/pentaguin.ipa
          retention-days: 14

  submit:
    needs: build
    runs-on: macos-15
    timeout-minutes: 30
    # Environnement GitHub « release » : ajouter une approbation manuelle requise
    # (Settings → Environments → release → Required reviewers).
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pentaguin-ios

      - name: Upload vers TestFlight (fastlane pilot + clé API ASC)
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 -d > "$RUNNER_TEMP/asc/key.p8"
          jq -n \
            --arg key_id "$ASC_KEY_ID" \
            --arg issuer_id "$ASC_ISSUER_ID" \
            --rawfile key "$RUNNER_TEMP/asc/key.p8" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
            > "$RUNNER_TEMP/asc/api_key.json"
          fastlane pilot upload \
            --ipa pentaguin.ipa \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --skip_waiting_for_build_processing true
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
