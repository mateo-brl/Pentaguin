# /etc/nginx/sites-available/pentaguin.conf

# Accès public par IP directe (choix v1.1) : http://82.66.208.23:8081/...
# Port dédié car le port 80/443 public est tenu par le WAF SafeLine (tengine
# docker en mode host) et la Freebox ne transmet que les ports configurés.
# Prérequis réseau (une fois) : redirection Freebox 8081/tcp → serveur,
# et ufw allow 8081/tcp (fait).
server {
    listen 8081 default_server;
    listen [::]:8081 default_server;
    server_name _;
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Vhost interne conservé pour une bascule future en domaine + HTTPS
# (pentaguin.mateobrl.fr via SafeLine → 127.0.0.1:4008) : le jour venu,
# entrée DNS + site SafeLine, et côté app un changement d'URL poussé en OTA.
server {
    listen 127.0.0.1:4008;
    listen [::1]:4008;
    server_name pentaguin.mateobrl.fr localhost;
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
