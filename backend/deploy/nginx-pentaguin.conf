# /etc/nginx/sites-available/pentaguin.conf
# Vhost interne (même pattern que vigifeux) : le WAF SafeLine en frontal
# route pentaguin.mateobrl.fr vers ce port local.
server {
    listen 127.0.0.1:4008;
    listen [::1]:4008;
    server_name pentaguin.mateobrl.fr localhost;
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
