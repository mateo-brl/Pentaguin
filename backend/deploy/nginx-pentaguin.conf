# /etc/nginx/sites-available/pentaguin.conf
# Exposition publique : https://pentaguin.mateobrl.fr (TLS terminé par le WAF
# SafeLine, qui route vers ce vhost interne). L'ancien accès HTTP par IP:8081
# a été fermé lors de la bascule HTTPS.
server {
    listen 127.0.0.1:4008;
    listen [::1]:4008;
    server_name pentaguin.mateobrl.fr localhost;
    client_max_body_size 100k;

    # Rate-limit en amont de l'app (zones dans conf.d/pentaguin-limits.conf)
    limit_req zone=pentaguin_req burst=20 nodelay;
    limit_req_status 429;
    limit_conn pentaguin_conn 20;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 10s;
    }
}
